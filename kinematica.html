    ctx.beginPath();ctx.arc(cx,cy,8,0,7);ctx.fill();ctx.stroke();
    ctx.fillStyle=getC('--dim');ctx.font='600 12px "Space Grotesk", sans-serif';ctx.textAlign='center';
    ctx.fillText('joint angle',cx,cy+R+34);ctx.restore();
    // ---- plots (right) ----
    const px=W*0.46, pw=W*0.48, ph=(H-150)/2, py1=64, py2=py1+ph+44;
    const plot=(yTop,fn,col,title)=>{
      const N=120, ys=[]; let mn=Infinity,mx=-Infinity;
      for(let i=0;i<=N;i++){const val=fn(prof.tf*i/N);ys.push(val);mn=Math.min(mn,val);mx=Math.max(mx,val);}
      if(mx-mn<1e-6){mx+=1;mn-=1;}
      const pad=(mx-mn)*0.14;mn-=pad;mx+=pad;
      const X=t=>px+(t/prof.tf)*pw, Y=v=>yTop+ph-((v-mn)/(mx-mn))*ph;
      ctx.save();
      ctx.strokeStyle='rgba(120,150,190,.2)';ctx.lineWidth=1;ctx.strokeRect(px,yTop,pw,ph);
      if(mn<0&&mx>0){ctx.strokeStyle='rgba(120,150,190,.3)';ctx.setLineDash([4,4]);
        ctx.beginPath();ctx.moveTo(px,Y(0));ctx.lineTo(px+pw,Y(0));ctx.stroke();ctx.setLineDash([]);}
      ctx.strokeStyle=col;ctx.lineWidth=2.4;ctx.beginPath();
      for(let i=0;i<=N;i++){const Xx=X(prof.tf*i/N),Yy=Y(ys[i]);i?ctx.lineTo(Xx,Yy):ctx.moveTo(Xx,Yy);}
      ctx.stroke();
      const NX=X(tt),NY=Y(fn(tt));
      ctx.strokeStyle='rgba(255,180,84,.45)';ctx.setLineDash([3,4]);
      ctx.beginPath();ctx.moveTo(NX,yTop);ctx.lineTo(NX,yTop+ph);ctx.stroke();ctx.setLineDash([]);
      ctx.fillStyle=getC('--accent');ctx.beginPath();ctx.arc(NX,NY,5,0,7);ctx.fill();
      ctx.fillStyle=getC('--dim');ctx.font='600 12px "Space Grotesk", sans-serif';ctx.textAlign='left';
      ctx.fillText(title,px,yTop-8);
      ctx.restore();
    };
    plot(py1,prof.q,getC('--accent2'),'position  q(t)   [deg]');
    plot(py2,prof.v,getC('--y'),'velocity  q̇(t)   [deg/s]');
    RO.innerHTML=
      ro('profile',S.mode==='trap'?'trapezoidal':'cubic','acc')+
      ro('move',fmt(S.q0,0)+'°  →  '+fmt(S.q1,0)+'°','')+
      ro('duration',prof.tf.toFixed(2)+' s','acc2')+
      ro('time t',tt.toFixed(2)+' s','')+
      ro('q(t)',fmt(qNow,1)+'°','acc')+
      ro('q̇(t)',fmt(prof.v(tt),1)+'°/s','y')+
      (S.mode==='trap'
        ?'<div class="verdict ok">Trapezoidal: constant-accel ramps + constant-speed cruise. Time-optimal under the limits, but accel is discontinuous.</div>'
        :'<div class="verdict ok">Cubic: velocity starts and ends at zero and varies smoothly — gentler on the motors, no abrupt accel jumps.</div>');
  }
};

/* ---------- MARKOV LOCALIZATION — 1D grid (Bayes) filter ---------- */
modules.markov = {
  title:'Markov Localization', is2D:true,
  blurb:`Where am I? A robot keeps a <b>belief</b> — a probability over every cell of a corridor (Ch. 16.2–16.3). Two updates alternate. The <b>perception update</b> (Bayes' rule) multiplies the belief by the sensor model and renormalizes — sensing a <b>door</b> boosts every door cell, sharpening the estimate. The <b>action update</b> convolves the belief with the motion model — each move <b>spreads</b> it out, since wheels slip.
The doors are <b>landmarks</b>: no single reading locates the robot (every door looks alike), but their <b>unique spacing</b>, combined with motion, collapses the belief onto the true cell. Step it by hand, or let it run.`,
  hint:'“Sense” sharpens the belief at doors; “Move →” spreads it. Watch the orange (most-likely) bar lock onto the true cell.',
  s:{N:16, doors:null, bel:null, truePos:5, rel:0.82, pExact:0.8, clock:0, mode:0, auto:false},
  initBelief(){const S=this.s; S.bel=new Array(S.N).fill(1/S.N);},
  ensure(){const S=this.s; if(!S.doors){S.doors=new Array(S.N).fill(false);[3,4,11].forEach(i=>S.doors[i]=true);} if(!S.bel)this.initBelief();},
  sense(){const S=this.s; const meas=S.doors[S.truePos]; let sum=0;
    for(let i=0;i<S.N;i++){ const pDoor=S.doors[i]?S.rel:(1-S.rel); S.bel[i]*= meas?pDoor:(1-pDoor); sum+=S.bel[i]; }
    if(sum>0)for(let i=0;i<S.N;i++)S.bel[i]/=sum;
  },
  move(){const S=this.s,N=S.N,pe=S.pExact,ps=(1-pe)/2; const nb=new Array(N).fill(0);
    for(let i=0;i<N;i++){ nb[i]+=S.bel[i]*ps; nb[(i+1)%N]+=S.bel[i]*pe; nb[(i+2)%N]+=S.bel[i]*ps; }
    S.bel=nb; S.truePos=(S.truePos+1)%N;
  },
  controls(){
    const S=this.s; this.ensure();
    chips('step',[{label:'Sense (perception)',value:'s'},{label:'Move → (action)',value:'m'}],
      v=>{ if(v==='s')this.sense(); else this.move(); });
    chips('',[{label:'⟲ reset belief',value:0}],()=>this.initBelief());
    slider('sensor reliability',0.55,0.98,S.rel,0.01,'z',x=>S.rel=x,x=>(x*100).toFixed(0)+'%');
    slider('motion certainty',0.5,1,S.pExact,0.02,'y',x=>S.pExact=x,x=>(x*100).toFixed(0)+'%');
    if(!reduceMotion) toggle('auto-run (sense ⇄ move)',S.auto,v=>{S.auto=v;S.clock=0;});
  },
  draw(){
    ctx.clearRect(0,0,W,H);
    const S=this.s; this.ensure();
    if(S.auto&&!reduceMotion){ S.clock+=1/60; if(S.clock>0.8){ S.clock=0; if(S.mode===0)this.sense(); else this.move(); S.mode^=1; } }
    const N=S.N, mg=Math.max(28,W*0.05), cw=(W-2*mg)/N, floorY=H*0.34;
    ctx.save();ctx.strokeStyle='rgba(120,150,190,.12)';ctx.lineWidth=1;
    for(let i=0;i<=N;i++){const x=mg+i*cw;ctx.beginPath();ctx.moveTo(x,floorY-44);ctx.lineTo(x,floorY);ctx.stroke();}
    ctx.restore();
    ctx.save();ctx.strokeStyle='rgba(120,150,190,.5)';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(mg,floorY);ctx.lineTo(W-mg,floorY);ctx.stroke();ctx.restore();
    for(let i=0;i<N;i++) if(S.doors[i]){ const x=mg+i*cw;
      ctx.save();ctx.strokeStyle=getC('--accent');ctx.lineWidth=2;ctx.fillStyle='rgba(255,180,84,.10)';
      ctx.beginPath();ctx.rect(x+cw*0.16,floorY-40,cw*0.68,40);ctx.fill();ctx.stroke();ctx.restore(); }
    const rx=mg+(S.truePos+0.5)*cw;
    ctx.save();ctx.fillStyle=getC('--accent2');ctx.beginPath();ctx.arc(rx,floorY-9,7,0,7);ctx.fill();
    ctx.fillStyle='#0a0e16';ctx.beginPath();ctx.arc(rx,floorY-9,2.5,0,7);ctx.fill();ctx.restore();
    const baseY=H*0.84, maxBar=H*0.42, mx=Math.max(...S.bel,1e-6);
    let best=0; for(let i=1;i<N;i++) if(S.bel[i]>S.bel[best])best=i;
    for(let i=0;i<N;i++){ const x=mg+i*cw, h=Math.max(2,S.bel[i]/mx*maxBar);
      ctx.fillStyle=i===best?'rgba(255,180,84,.85)':'rgba(45,212,212,.6)';
      ctx.fillRect(x+cw*0.16, baseY-h, cw*0.68, h); }
    ctx.save();ctx.strokeStyle='rgba(120,150,190,.3)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(mg,baseY);ctx.lineTo(W-mg,baseY);ctx.stroke();ctx.restore();
    ctx.save();ctx.strokeStyle=getC('--accent2');ctx.lineWidth=1.5;ctx.setLineDash([3,3]);
    ctx.strokeRect(mg+S.truePos*cw+cw*0.16, baseY-maxBar, cw*0.68, maxBar);ctx.restore();
    ctx.save();ctx.fillStyle=getC('--faint');ctx.font='600 11px "Space Grotesk",sans-serif';ctx.textAlign='center';
    ctx.fillText('corridor — orange doorways are landmarks, cyan dot = true robot', W/2, floorY-52);
    ctx.fillText('belief  bel(x)   (dashed = true cell)', W/2, baseY+16);ctx.restore();
    const ent=-S.bel.reduce((s,p)=>s+(p>1e-9?p*Math.log2(p):0),0);
    RO.innerHTML=
      ro('doors at','['+S.doors.map((d,i)=>d?i:null).filter(v=>v!==null).join(', ')+']','acc')+
      ro('true cell',S.truePos,'acc2')+
      '<div class="rline" style="margin-top:6px"><span>belief</span></div>'+
      ro('most likely cell',best+(best===S.truePos?'  ✓':'  ✗'),'acc')+
      ro('its probability',(S.bel[best]*100).toFixed(1)+'%','acc')+
      ro('P(true cell)',(S.bel[S.truePos]*100).toFixed(1)+'%','acc2')+
      ro('entropy',ent.toFixed(2)+' / '+Math.log2(N).toFixed(1)+' bits','')+
      (S.bel[best]>0.5&&best===S.truePos
        ? '<div class="verdict ok">Localized — belief is concentrated on the correct cell.</div>'
        : '<div class="verdict warn">Still ambiguous. Sense at doors and move to exploit their unique spacing.</div>');
  }
};

/* ---------- PARTICLE FILTER — 2D range-to-landmarks localization ---------- */
modules.particle = {
  title:'Particle Filter', is2D:true,
  blurb:`A <b>particle filter</b> represents the belief not as a grid but as a swarm of <b>guesses</b> (Ch. 16.4) — cheap in large or continuous spaces. Each particle is a candidate position. Every step: (1) <b>move</b> every particle by the robot's odometry plus noise; (2) <b>weight</b> each by how well its predicted ranges to the known <b>landmarks</b> match the noisy measurement, <span class="k">w ∝ exp(−Σ(d−z)²/2σ²)</span>; (3) <b>resample</b> — particles with high weight are copied, poor ones die. The cloud quickly collapses onto the true robot and then tracks it. It is a <b>non-parametric</b> estimator, so it handles arbitrary, multi-peaked beliefs a Kalman filter cannot.`,
  hint:'Particles (cyan) start scattered, then converge on the true robot (green) by matching ranges to the blue landmarks.',
  s:{N:400, ss:0.25, sm:0.04, rough:0.03, lm:[{x:-2.6,y:2.3},{x:2.8,y:1.2},{x:0.1,y:-2.6}],
     parts:null, tx:0,ty:0, t:0, neff:0, play:true},
  path(t){ return [2.4*Math.sin(t*0.55), 2.0*Math.sin(t*0.8+0.7)]; },
  scatter(){ const S=this.s,R=3.3,p=[]; for(let i=0;i<S.N;i++)p.push({x:(Math.random()*2-1)*R,y:(Math.random()*2-1)*R,w:1/S.N}); S.parts=p; const t0=this.path(S.t); S.tx=t0[0];S.ty=t0[1]; },
  ensure(){ if(!this.s.parts)this.scatter(); },
  controls(){
    const S=this.s; this.ensure();
    slider('particles',60,800,S.N,20,'acc',x=>{S.N=Math.round(x);this.scatter();},x=>x.toFixed(0));
    slider('sensor noise σ',0.05,0.8,S.ss,0.01,'z',x=>S.ss=x);
    slider('motion noise',0,0.2,S.sm,0.01,'y',x=>S.sm=x);
    chips('',[{label:'⟲ scatter / reset',value:0}],()=>this.scatter());
    if(!reduceMotion) toggle('play',S.play,v=>S.play=v);
  },
  draw(){
    grid2();
    const S=this.s; this.ensure();
    if(S.play&&!reduceMotion){
      S.t+=1/60;
      const np=this.path(S.t), dx=np[0]-S.tx, dy=np[1]-S.ty; S.tx=np[0];S.ty=np[1];
      for(const p of S.parts){ p.x+=dx+randn()*S.sm; p.y+=dy+randn()*S.sm; }   // predict
      const z=S.lm.map(l=>Math.hypot(S.tx-l.x,S.ty-l.y)+randn()*S.ss);          // measure
      let sum=0;
      for(const p of S.parts){ let w=1;
        for(let k=0;k<S.lm.length;k++){ const e=Math.hypot(p.x-S.lm[k].x,p.y-S.lm[k].y)-z[k]; w*=Math.exp(-e*e/(2*S.ss*S.ss)); }
        p.w=w; sum+=w; }
      if(sum>1e-12){ for(const p of S.parts)p.w/=sum;
        let n2=0; for(const p of S.parts)n2+=p.w*p.w; S.neff=1/n2;
        S.parts=resample(S.parts);
        for(const p of S.parts){ p.x+=randn()*S.rough; p.y+=randn()*S.rough; }   // roughen
      } else this.scatter();
    }
    // room
    const a=w2s(-3.3,3.3), b=w2s(3.3,-3.3);
    ctx.save();ctx.strokeStyle='rgba(120,150,190,.35)';ctx.lineWidth=2;ctx.strokeRect(a.x,a.y,b.x-a.x,b.y-a.y);ctx.restore();
    // measurement lines true->landmarks
    ctx.save();ctx.strokeStyle='rgba(120,150,190,.18)';ctx.lineWidth=1;
    S.lm.forEach(l=>{const A=w2s(S.tx,S.ty),B=w2s(l.x,l.y);ctx.beginPath();ctx.moveTo(A.x,A.y);ctx.lineTo(B.x,B.y);ctx.stroke();});ctx.restore();
    // particles
    ctx.save();ctx.fillStyle='rgba(45,212,212,.55)';
    for(const p of S.parts){const P=w2s(p.x,p.y);ctx.fillRect(P.x-1,P.y-1,2.5,2.5);}ctx.restore();
    // landmarks (blue diamonds)
    S.lm.forEach((l,i)=>{const P=w2s(l.x,l.y);ctx.save();ctx.translate(P.x,P.y);ctx.rotate(Math.PI/4);
      ctx.fillStyle=getC('--z');ctx.fillRect(-6,-6,12,12);ctx.restore();
      ctx.save();ctx.fillStyle=getC('--z');ctx.font='600 11px "Space Grotesk",sans-serif';ctx.fillText('L'+(i+1),P.x+10,P.y-8);ctx.restore();});
    // estimate = mean of particles
    let ex=0,ey=0; for(const p of S.parts){ex+=p.x;ey+=p.y;} ex/=S.parts.length; ey/=S.parts.length;
    const E=w2s(ex,ey);
    ctx.save();ctx.strokeStyle=getC('--accent');ctx.lineWidth=2;ctx.beginPath();ctx.arc(E.x,E.y,10,0,7);ctx.stroke();ctx.restore();
    // true robot (green)
    const T=w2s(S.tx,S.ty);
    ctx.save();ctx.fillStyle=getC('--y');ctx.beginPath();ctx.arc(T.x,T.y,6,0,7);ctx.fill();
    ctx.fillStyle='#0a0e16';ctx.beginPath();ctx.arc(T.x,T.y,2.5,0,7);ctx.fill();ctx.restore();
    // spread (stddev) for verdict
    let v=0; for(const p of S.parts)v+=(p.x-ex)**2+(p.y-ey)**2; const spread=Math.sqrt(v/S.parts.length);
    const err=Math.hypot(ex-S.tx,ey-S.ty);
    RO.innerHTML=
      ro('particles',S.parts.length,'acc2')+
      ro('landmarks',S.lm.length,'z')+
      ro('sensor noise σ',S.ss.toFixed(2)+' u','')+
      '<div class="rline" style="margin-top:6px"><span>estimate</span></div>'+
      ro('estimate error',err.toFixed(2)+' u','acc')+
      ro('cloud spread',spread.toFixed(2)+' u','acc2')+
      ro('effective N','≈ '+S.neff.toFixed(0)+' / '+S.parts.length,'')+
      (spread<0.6
        ? '<div class="verdict ok">Converged — the swarm has localized and is tracking the true robot.</div>'
        : '<div class="verdict warn">Still spread out — resampling is concentrating particles onto likely poses.</div>');
  }
};

/* ---------- SLAM — graph-based, with loop closure ---------- */
modules.slam = {
  title:'SLAM (Loop Closure)', is2D:true,
  blurb:`<b>SLAM</b> — Simultaneous Localization And Mapping — is the chicken-and-egg problem at the heart of mobile robotics (Ch. 17): to build a map you must know where you are, but to know where you are you need a map. The robot does <b>both at once</b>.
On <b>odometry alone</b>, small wheel errors accumulate (Ch. 15) and the estimated path <b>drifts</b> from truth, dragging every landmark it records along with it — the map smears.
The cure is a <b>loop closure</b>: when the robot re-recognizes a landmark it saw before, it gets a hard constraint — “I'm back where I started.” <b>Graph-based SLAM</b> casts poses as nodes and measurements as edges (springs) and finds the configuration that minimizes total weighted error,
<span class="k">x* = argmin Σ e<sub>ij</sub><sup>T</sup> Ω<sub>ij</sub> e<sub>ij</sub></span>.
Closing the loop pulls the graph taut, <b>redistributing the accumulated error backward along the trajectory</b> so the path snaps shut and the landmarks settle onto their true places. Watch drift build over a lap, then collapse the instant the loop closes.`,
  hint:'Cyan = SLAM estimate (drifting); faint gray/blue = ground truth. At each loop closure the path & map snap onto truth.',
  s:{A:2.6,B:1.9, drift:0.6, lm:null, s:0, ex:0,ey:0, bx:0,by:0, estPath:null, map:null, closeFlash:0, lastGap:0, showTruth:true, play:true},
  truePose(s){ const a=2*Math.PI*s; return [this.s.A*Math.cos(a), this.s.B*Math.sin(a)]; },
  newLap(x,y){ const S=this.s; S.ex=x;S.ey=y;S.s=0;S.estPath=[{x:x,y:y}];   // per-lap systematic odometry bias (accumulates ~linearly)
    S.bx=(Math.random()*2-1)*S.drift*0.008; S.by=(Math.random()*2-1)*S.drift*0.008; },
  reset(){ const S=this.s; const p=this.truePose(0); this.newLap(p[0],p[1]); S.map={};S.closeFlash=0; },
  ensure(){ const S=this.s; if(!S.lm){ S.lm=[]; for(let k=0;k<6;k++){const a=k*Math.PI/3; S.lm.push([1.35*S.A*Math.cos(a),1.35*S.B*Math.sin(a)]);} } if(!S.estPath)this.reset(); },
  closeLoop(){ const S=this.s,n=S.estPath.length-1; if(n<1)return;
    const gx=S.estPath[n].x-S.estPath[0].x, gy=S.estPath[n].y-S.estPath[0].y;
    for(let i=0;i<=n;i++){ const f=i/n; S.estPath[i].x-=f*gx; S.estPath[i].y-=f*gy; }
    for(const id in S.map){ const f=S.map[id].anchor/n; S.map[id].x-=f*gx; S.map[id].y-=f*gy; }
    S.closeFlash=1.4; S.lastGap=Math.hypot(gx,gy);
  },
  controls(){
    const S=this.s; this.ensure();
    slider('odometry drift',0.1,1.5,S.drift,0.05,'z',x=>S.drift=x,x=>(x).toFixed(2));
    chips('',[{label:'⟲ reset run',value:0}],()=>this.reset());
    toggle('show ground truth',S.showTruth,v=>S.showTruth=v);
    if(!reduceMotion) toggle('drive',S.play,v=>S.play=v);
  },
  draw(){
    grid2();
    const S=this.s; this.ensure();
    if(S.play&&!reduceMotion){
      if(S.closeFlash>0){ S.closeFlash-=1/60; if(S.closeFlash<=0){ const c=S.estPath[S.estPath.length-1]; this.newLap(c.x,c.y); } }
      else { const ds=1/420, a=this.truePose(S.s), b=this.truePose(S.s+ds);
        const dx=b[0]-a[0], dy=b[1]-a[1];
        S.ex+=dx+S.bx+randn()*S.drift*0.004;               // odometry = true step + systematic bias + jitter
        S.ey+=dy+S.by+randn()*S.drift*0.004;
        S.estPath.push({x:S.ex,y:S.ey});
        S.lm.forEach((L,id)=>{ if(Math.hypot(b[0]-L[0],b[1]-L[1])<1.7)
          S.map[id]={x:S.ex+(L[0]-b[0]), y:S.ey+(L[1]-b[1]), anchor:S.estPath.length-1}; });   // observe -> map (drifted)
        S.s+=ds; if(S.s>=1)this.closeLoop();
      }
    }
    const tp=this.truePose(S.s>=1?0:S.s), closed=S.closeFlash>0;
    // ground truth (faint)
    if(S.showTruth){
      ctx.save();ctx.strokeStyle='rgba(120,150,190,.3)';ctx.lineWidth=1.5;ctx.setLineDash([2,4]);ctx.beginPath();
      for(let i=0;i<=90;i++){const p=this.truePose(i/90),P=w2s(p[0],p[1]);i?ctx.lineTo(P.x,P.y):ctx.moveTo(P.x,P.y);}ctx.closePath();ctx.stroke();ctx.restore();
      S.lm.forEach(L=>{const P=w2s(L[0],L[1]);ctx.save();ctx.translate(P.x,P.y);ctx.rotate(Math.PI/4);ctx.strokeStyle='rgba(77,140,255,.5)';ctx.lineWidth=1.5;ctx.strokeRect(-5,-5,10,10);ctx.restore();});
      const Tt=w2s(tp[0],tp[1]);ctx.save();ctx.fillStyle='rgba(120,150,190,.5)';ctx.beginPath();ctx.arc(Tt.x,Tt.y,4,0,7);ctx.fill();ctx.restore();
    }
    // estimated (SLAM) path
    if(S.estPath.length>1){ctx.save();ctx.strokeStyle=closed?getC('--y'):'rgba(45,212,212,.8)';ctx.lineWidth=closed?3:2;
      ctx.beginPath();S.estPath.forEach((p,i)=>{const P=w2s(p.x,p.y);i?ctx.lineTo(P.x,P.y):ctx.moveTo(P.x,P.y);});ctx.stroke();ctx.restore();}
    // estimated landmarks (the map)
    let mapErr=0,mc=0;
    for(const id in S.map){ const m=S.map[id],L=S.lm[id],P=w2s(m.x,m.y);
      if(S.showTruth){const Q=w2s(L[0],L[1]);ctx.save();ctx.strokeStyle='rgba(255,180,84,.25)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(P.x,P.y);ctx.lineTo(Q.x,Q.y);ctx.stroke();ctx.restore();}
      ctx.save();ctx.translate(P.x,P.y);ctx.rotate(Math.PI/4);ctx.fillStyle=closed?getC('--y'):getC('--accent');ctx.fillRect(-5,-5,10,10);ctx.restore();
      mapErr+=Math.hypot(m.x-L[0],m.y-L[1]); mc++;
    }
    if(mc)mapErr/=mc;
    // estimated robot (head of path)
    const e=S.estPath[S.estPath.length-1], E=w2s(e.x,e.y);
    ctx.save();ctx.fillStyle=closed?getC('--y'):getC('--accent2');ctx.beginPath();ctx.arc(E.x,E.y,7,0,7);ctx.fill();
    ctx.fillStyle='#0a0e16';ctx.beginPath();ctx.arc(E.x,E.y,2.5,0,7);ctx.fill();ctx.restore();
    if(closed){ctx.save();ctx.fillStyle=getC('--y');ctx.font='600 14px "Space Grotesk",sans-serif';ctx.textAlign='center';ctx.fillText('LOOP CLOSED',W/2,38);ctx.restore();}
    const robotErr=Math.hypot(e.x-tp[0],e.y-tp[1]);
    RO.innerHTML=
      ro('odometry drift',S.drift.toFixed(2),'')+
      ro('lap progress',(Math.min(S.s,1)*100).toFixed(0)+'%','')+
      ro('landmarks mapped',mc+' / '+S.lm.length,'acc')+
      '<div class="rline" style="margin-top:6px"><span>estimate vs. ground truth</span></div>'+
      ro('robot drift error',robotErr.toFixed(2)+' u','acc2')+
      ro('avg map error',mapErr.toFixed(2)+' u','acc2')+
      (S.lastGap?ro('last loop-closure gap',S.lastGap.toFixed(2)+' u','acc'):'')+
      (closed
        ? '<div class="verdict ok">Loop closed — the closure error was redistributed along the trajectory, snapping path &amp; map onto truth.</div>'
        : '<div class="verdict warn">Driving on odometry — drift bends the path and smears the map. A loop closure will correct it.</div>');
  }
};

/* small readout helpers */
function ro(k,v,cls){ return '<div class="rline"><span>'+k+'</span><span class="v '+(cls||'')+'">'+v+'</span></div>'; }
/* standard-normal sample (Box–Muller) and low-variance resampler for the particle filter */
function randn(){ let u=0,v=0; while(u===0)u=Math.random(); while(v===0)v=Math.random(); return Math.sqrt(-2*Math.log(u))*Math.cos(2*Math.PI*v); }
function resample(parts){ const N=parts.length,out=[]; const step=1/N; let r=Math.random()*step, c=parts[0].w, i=0;
  for(let m=0;m<N;m++){ const U=r+m*step; while(U>c&&i<N-1){ i++; c+=parts[i].w; } out.push({x:parts[i].x,y:parts[i].y,w:step}); }
  return out;
}
/* a real bracketed matrix/vector: cellsHtml = concatenated <span> cells, cols = column count */
function matEq(cellsHtml, cols, brk){
  brk = brk || getC('--accent');
  return '<div class="mateq"><div class="brk l" style="border-color:'+brk+'"></div>'+
    '<div class="mgrid" style="grid-template-columns:repeat('+cols+',auto)">'+cellsHtml+'</div>'+
    '<div class="brk r" style="border-color:'+brk+'"></div></div>';
}
function vecRow(v,cls){
  const brk = cls==='acc2'?getC('--accent2'):getC('--accent');
  const c='<span style="color:var(--x)">'+fmt(v[0])+'</span>'+
          '<span style="color:var(--y)">'+fmt(v[1])+'</span>'+
          '<span style="color:var(--z)">'+fmt(v[2])+'</span>';
  return matEq(c,1,brk);
}
function matrix4(R,t){
  let c='';
  for(let i=0;i<3;i++){ for(let j=0;j<3;j++)c+='<span>'+fmt(R[i][j])+'</span>'; c+='<span style="color:var(--accent)">'+fmt(t[i])+'</span>'; }
  c+='<span>0</span><span>0</span><span>0</span><span>1</span>';
  return matEq(c,4);
}
/* leading prescript {}^sup_sub (e.g. for ${}^A_B T$ transform notation) */
function preT(sup,sub){ return '<span class="ps"><span class="u">'+sup+'</span><span class="d">'+sub+'</span></span>'; }
/* draw a differential-wheel robot at (x,y) heading th, body width d, wheel radius r */
function drawDiffRobot(x,y,th,d,r){
  const c=w2s(x,y);
  const hx=Math.cos(th),hy=Math.sin(th);    // heading direction
  const px=-Math.sin(th),py=Math.cos(th);   // left/perpendicular direction
  ctx.save();ctx.fillStyle='rgba(255,180,84,.12)';ctx.strokeStyle=getC('--accent');ctx.lineWidth=2;
  ctx.beginPath();ctx.arc(c.x,c.y,d/2*PPU,0,7);ctx.fill();ctx.stroke();ctx.restore();
  [[1,getC('--y')],[-1,getC('--x')]].forEach(([sgn,col])=>{   // left wheel green, right wheel red
    const wx=x+px*sgn*d/2, wy=y+py*sgn*d/2;
    line2(w2s(wx-hx*r,wy-hy*r), w2s(wx+hx*r,wy+hy*r), col, 5);
  });
  arrow2w(x,y,x+hx*d*0.7,y+hy*d*0.7,getC('--accent2'),2.5);
}

/* ============================ shell ============================== */
const order=['vectors','dot','cross','frames','rotations','matrix','eigen',
  'fk','dh','ik','workspace','singularity','diffdrive','mobileik','trajectory','markov','particle','slam'];
const labels={vectors:'Vectors',dot:'Dot Product',cross:'Cross Product',frames:'Frames & Transforms',
  rotations:'Rotations',matrix:'Matrices as Maps',eigen:'Eigenvectors',
  fk:'Forward Kinematics',dh:'DH Parameters',ik:'Inverse Kinematics',workspace:'Workspace',
  singularity:'Singularities',diffdrive:'Differential Drive',mobileik:'Mobile Inverse Kinematics',
  trajectory:'Motion Profiles',markov:'Markov Localization',particle:'Particle Filter',slam:'SLAM (Loop Closure)'};
let active='vectors';
const navEl=document.getElementById('nav');
order.forEach((k,i)=>{
  const b=document.createElement('button');
  b.innerHTML='<span class="n">'+String(i+1).padStart(2,'0')+'</span>'+labels[k];
  b.onclick=()=>select(k); b.dataset.key=k; navEl.append(b);
});
function select(k){
  active=k; const m=modules[k];
  document.getElementById('modTitle').textContent=m.title;
  document.getElementById('modBlurb').innerHTML=m.blurb;
  document.getElementById('hint').textContent=m.hint||'';
  document.getElementById('seqLabel').textContent='module '+(order.indexOf(k)+1)+' / '+order.length;
  C.innerHTML=''; RO.innerHTML='';
  m.controls&&m.controls();
  [...navEl.children].forEach(b=>b.setAttribute('aria-current', b.dataset.key===k));
  computeView(m);
}
function computeView(m){
  if(m.is2D){ PPU = Math.min(W,H)/9.0; }
}

/* pointer interaction */
let pdown=false,lastx=0,lasty=0;
cv.addEventListener('pointerdown',e=>{
  cv.setPointerCapture(e.pointerId); pdown=true; lastx=e.offsetX; lasty=e.offsetY;
  cv.classList.add('dragging');
  const m=modules[active];
  if(m.is2D&&m.pointerDown){const [wx,wy]=s2w(e.offsetX,e.offsetY); m.pointerDown(wx,wy);}
});
cv.addEventListener('pointermove',e=>{
  if(!pdown)return;
  const m=modules[active];
  if(m.is2D){ if(m.pointerMove){const [wx,wy]=s2w(e.offsetX,e.offsetY); m.pointerMove(wx,wy);} }
  else { cam.theta -= (e.offsetX-lastx)*0.008; cam.phi=clamp(cam.phi+(e.offsetY-lasty)*0.008,rad(-85),rad(85)); }
  lastx=e.offsetX; lasty=e.offsetY;
});
function enddrag(){pdown=false;cv.classList.remove('dragging');const m=modules[active];if(m.is2D&&m.pointerUp)m.pointerUp();}
cv.addEventListener('pointerup',enddrag);
cv.addEventListener('pointercancel',enddrag);

/* render loop */
function frame(){
  ctx.clearRect(0,0,W,H);
  const m=modules[active];
  computeView(m);
  m.draw();
  requestAnimationFrame(frame);
}
resize(); select('vectors'); requestAnimationFrame(frame);
window.addEventListener('resize',()=>{resize();});
</script>
